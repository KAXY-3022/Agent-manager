  <text x="192" y="577" font-family="Arial, sans-serif" font-size="13" font-weight="900" fill="#ffffff">Reload</text>
  <rect x="108" y="606" width="244" height="36" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
