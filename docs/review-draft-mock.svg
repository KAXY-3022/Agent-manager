  <text x="1041" y="226" font-family="Arial, sans-serif" font-size="10" font-weight="900" fill="#ffffff">post</text>

  <g font-family="Menlo, Consolas, monospace" font-size="14">
    <text x="448" y="286" fill="#93c5fd">## Automated PR Review</text>
    <text x="448" y="324" fill="#e5e7eb">**Verdict:** Needs human review</text>
    <text x="448" y="362" fill="#fbbf24">### Findings</text>
    <text x="448" y="394" fill="#d1d5db">- [blocking] markdown rendering regresses nested lists.</text>
    <text x="448" y="426" fill="#d1d5db">- [medium] preserve fenced code blocks inside review comments.</text>
    <text x="448" y="476" fill="#fbbf24">### Suggested PR Comment</text>
    <text x="448" y="508" fill="#d1d5db">Thanks. I found one rendering regression and a focused fix path.</text>
    <text x="448" y="540" fill="#d1d5db">I am on it; no extra automated reply will be posted until updated.</text>
    <text x="448" y="590" fill="#94a3b8">Runtime: codex / provider: cc-switch / model: gpt-5.5</text>
  </g>
</svg>
