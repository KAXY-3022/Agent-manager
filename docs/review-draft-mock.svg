  <text x="80" y="166" font-family="Arial, sans-serif" font-size="13" fill="#64748b">Inspect, edit, and post the agent's suggested Gitea comment after human review.</text>

  <rect x="80" y="198" width="300" height="476" rx="16" fill="#f8fafc" stroke="#dbe4ee"/>
  <text x="108" y="234" font-family="Arial, sans-serif" font-size="12" font-weight="900" fill="#64748b">TASK PACKAGE</text>
