<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Queue and monitor mock screenshot</title>
  <desc id="desc">A mock queue dashboard showing polling status, queued jobs, completed deliveries, and runtime configuration.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="#f4f7fb"/>
  <rect x="48" y="42" width="1104" height="676" rx="22" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="48" y="42" width="1104" height="52" rx="22" fill="#111827"/>
  <rect x="48" y="76" width="1104" height="18" fill="#111827"/>
  <circle cx="80" cy="68" r="6" fill="#ef4444"/>
  <circle cx="102" cy="68" r="6" fill="#f59e0b"/>
  <circle cx="124" cy="68" r="6" fill="#22c55e"/>
  <text x="160" y="73" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#f9fafb">Queue and Monitor</text>

  <text x="80" y="142" font-family="Arial, sans-serif" font-size="26" font-weight="900" fill="#0f172a">Runtime Operations</text>
  <text x="80" y="166" font-family="Arial, sans-serif" font-size="13" fill="#64748b">Monitor polling, queue state, and delivery outcomes while keeping automated jobs bounded.</text>

  <g>
    <rect x="80" y="200" width="244" height="96" rx="16" fill="#ecfdf5" stroke="#86efac"/>
    <text x="108" y="232" font-family="Arial, sans-serif" font-size="11" font-weight="900" fill="#166534">MONITOR</text>
    <text x="108" y="262" font-family="Arial, sans-serif" font-size="24" font-weight="900" fill="#14532d">Active</text>
    <text x="108" y="282" font-family="Arial, sans-serif" font-size="12" fill="#166534">polling 9 repos every 60s</text>

    <rect x="348" y="200" width="244" height="96" rx="16" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="376" y="232" font-family="Arial, sans-serif" font-size="11" font-weight="900" fill="#1d4ed8">RUNTIME</text>
    <text x="376" y="262" font-family="Arial, sans-serif" font-size="24" font-weight="900" fill="#1e3a8a">Codex</text>
    <text x="376" y="282" font-family="Arial, sans-serif" font-size="12" fill="#1d4ed8">provider cc-switch</text>

    <rect x="616" y="200" width="244" height="96" rx="16" fill="#fff7ed" stroke="#fdba74"/>
    <text x="644" y="232" font-family="Arial, sans-serif" font-size="11" font-weight="900" fill="#9a3412">QUEUE</text>
    <text x="644" y="262" font-family="Arial, sans-serif" font-size="24" font-weight="900" fill="#9a3412">4 queued</text>
    <text x="644" y="282" font-family="Arial, sans-serif" font-size="12" fill="#c2410c">2 running / 0 failed</text>
  </g>

  <rect x="80" y="334" width="500" height="324" rx="16" fill="#f8fafc" stroke="#dbe4ee"/>
  <text x="110" y="372" font-family="Arial, sans-serif" font-size="15" font-weight="900" fill="#0f172a">Jobs</text>
  <g font-family="Arial, sans-serif">
    <rect x="110" y="398" width="438" height="54" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <circle cx="134" cy="425" r="6" fill="#2563eb"/>
    <text x="154" y="421" font-size="13" font-weight="900" fill="#0f172a">PR review</text>
    <text x="154" y="440" font-size="11" fill="#64748b">moras-brain#586@9dcaf77 / running</text>
    <rect x="110" y="466" width="438" height="54" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <circle cx="134" cy="493" r="6" fill="#f97316"/>
    <text x="154" y="489" font-size="13" font-weight="900" fill="#0f172a">Issue auto-fix</text>
    <text x="154" y="508" font-size="11" fill="#64748b">moras-api#254 / queued after approval</text>
    <rect x="110" y="534" width="438" height="54" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <circle cx="134" cy="561" r="6" fill="#22c55e"/>
    <text x="154" y="557" font-size="13" font-weight="900" fill="#0f172a">Comment reply review</text>
    <text x="154" y="576" font-size="11" fill="#64748b">moras-console#164 / done</text>
  </g>

  <rect x="620" y="334" width="484" height="324" rx="16" fill="#0f172a"/>
  <text x="650" y="372" font-family="Arial, sans-serif" font-size="15" font-weight="900" fill="#ffffff">Recent Deliveries</text>
  <g font-family="Arial, sans-serif">
    <text x="650" y="414" font-size="12" font-weight="900" fill="#93c5fd">12:31</text>
    <text x="704" y="414" font-size="12" fill="#e5e7eb">PR#590 discovered through linked issue #580</text>
    <rect x="650" y="430" width="410" height="1" fill="#334155"/>
    <text x="650" y="466" font-size="12" font-weight="900" fill="#93c5fd">12:28</text>
    <text x="704" y="466" font-size="12" fill="#e5e7eb">manual refresh polled Git without queueing jobs</text>
    <rect x="650" y="482" width="410" height="1" fill="#334155"/>
    <text x="650" y="518" font-size="12" font-weight="900" fill="#93c5fd">12:25</text>
    <text x="704" y="518" font-size="12" fill="#e5e7eb">PR#586 feedback acknowledged until newer comment</text>
    <rect x="650" y="534" width="410" height="1" fill="#334155"/>
    <text x="650" y="570" font-size="12" font-weight="900" fill="#93c5fd">12:19</text>
    <text x="704" y="570" font-size="12" fill="#e5e7eb">issue#254 easy assessment saved locally</text>
  </g>
</svg>
