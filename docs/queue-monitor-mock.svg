<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Queue and monitor mock screenshot</title>
  <desc id="desc">A dark mock screenshot matching the real queue table and sidebar runtime monitor state.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <style><![CDATA[
      .bg{fill:#080b12}.app{fill:#0b101a}.rail{fill:#0e1421}.top{fill:#111827}.panel{fill:#111827;stroke:#263246}.panel2{fill:#151e2f;stroke:#334155}.row{fill:#151e2f}.ink{fill:#edf2fb}.muted{fill:#97a3b7}.subtle{fill:#6f7d92}.cyan{fill:#66d9ef}.ok{fill:#4ade80}.warn{fill:#f59e0b}.bad{fill:#fb7185}.txt{font-family:"Avenir Next","Aptos",system-ui,sans-serif}.mono{font-family:"JetBrains Mono","SFMono-Regular",Menlo,monospace}.heavy{font-weight:800}.bold{font-weight:650}.tiny{font-size:10px}.small{font-size:12px}.body{font-size:13px}.line{stroke:#263246;stroke-width:1}.pill{fill:#1e293b;stroke:#475569}
    ]]></style>
  </defs>
