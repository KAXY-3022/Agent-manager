<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">A2A Agent Runner dashboard mock screenshot</title>
  <desc id="desc">A dark mock dashboard matching the real A2A Review board with PR lanes, issue row, and attention inspector.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <style><![CDATA[
      .bg{fill:#080b12}.app{fill:#0b101a}.rail{fill:#0e1421}.rail2{fill:#111928}.top{fill:#111827}.panel{fill:#111827;stroke:#263246}.panel2{fill:#151e2f;stroke:#2b384f}.card{fill:#151e2f;stroke:#334155}.lane{fill:#0f1724;stroke:#263246}.soft{fill:#1b2638;stroke:#334155}.ink{fill:#edf2fb}.muted{fill:#97a3b7}.subtle{fill:#6f7d92}.cyan{fill:#66d9ef}.blue{fill:#7aa2ff}.ok{fill:#4ade80}.warn{fill:#f59e0b}.bad{fill:#fb7185}.orange{fill:#f97316}.txt{font-family:"Avenir Next","Aptos",system-ui,sans-serif}.mono{font-family:"JetBrains Mono","SFMono-Regular",Menlo,monospace}.heavy{font-weight:800}.bold{font-weight:650}.tiny{font-size:10px}.small{font-size:12px}.body{font-size:13px}.h{font-size:22px;font-weight:800}.metric{font-size:30px;font-weight:800}.pill{fill:#1e293b;stroke:#475569}.line{stroke:#263246;stroke-width:1}
    ]]></style>
  </defs>
  <rect width="1200" height="760" class="bg"/>
  <rect x="18" y="18" width="1164" height="724" rx="22" class="app" filter="url(#shadow)"/>

  <rect x="18" y="18" width="252" height="724" rx="22" class="rail"/>
  <rect x="248" y="18" width="22" height="724" class="rail"/>
  <line x1="270" y1="18" x2="270" y2="742" class="line"/>
  <g class="txt">
    <rect x="40" y="40" width="34" height="34" rx="11" fill="#66d9ef"/>
    <text x="52" y="63" font-size="16" font-weight="850" fill="#06111f">A</text>
    <text x="86" y="55" class="ink body heavy">A2A Review</text>
    <text x="86" y="73" class="muted small">Agent workflow board</text>
    <text x="42" y="126" class="subtle tiny heavy">REVIEW OPS</text>
    <rect x="38" y="144" width="190" height="36" rx="10" fill="#162337" stroke="#2f3d55"/>
    <rect x="38" y="144" width="4" height="36" rx="2" fill="#66d9ef"/>
    <text x="58" y="167" class="ink body bold">Board</text>
    <text x="58" y="211" class="muted body">Pull requests</text>
    <text x="58" y="251" class="muted body">Review drafts</text>
    <text x="58" y="291" class="muted body">Review requests</text>
    <text x="58" y="331" class="muted body">Stale queue</text>
    <rect x="38" y="474" width="190" height="156" rx="14" class="soft"/>
    <text x="54" y="504" class="subtle tiny heavy">RUNTIME</text>
    <text x="54" y="532" class="muted small">codex / cc-switch</text>
    <text x="54" y="563" class="subtle tiny heavy">MONITOR</text>
    <text x="54" y="591" class="ok small">running, poll 60s</text>
    <text x="54" y="622" class="subtle tiny heavy">WEBHOOK</text>
  </g>

  <rect x="270" y="18" width="912" height="66" class="top"/>
  <g class="txt">
    <text x="302" y="57" class="muted body">A2A / <tspan class="ink heavy">Board</tspan></text>
    <rect x="642" y="34" width="250" height="34" rx="17" fill="#0b1220" stroke="#263246"/>
    <text x="668" y="56" class="subtle small">Search...</text>
    <rect x="912" y="34" width="92" height="34" rx="10" class="panel2"/>
    <text x="935" y="56" class="ink small bold">Refresh</text>
    <rect x="1014" y="34" width="110" height="34" rx="10" fill="#1e293b" stroke="#f59e0b"/>
    <text x="1036" y="56" class="warn small bold">Scan Stale</text>
  </g>

  <g class="txt">
    <rect x="294" y="108" width="198" height="92" rx="14" class="panel2"/>
    <text x="316" y="136" class="subtle tiny heavy">TOTAL PRS</text>
    <text x="316" y="173" class="ink metric">18<tspan class="muted small"> active</tspan></text>
    <text x="316" y="192" class="muted tiny">4 waiting in WIP</text>
    <rect x="506" y="108" width="198" height="92" rx="14" class="panel2"/>
    <text x="528" y="136" class="subtle tiny heavy">REVIEWING</text>
    <text x="528" y="173" class="ink metric">6<tspan class="muted small"> in progress</tspan></text>
    <text x="528" y="192" class="muted tiny">PR#586 needs eyes</text>
    <rect x="718" y="108" width="198" height="92" rx="14" class="panel2"/>
    <text x="740" y="136" class="subtle tiny heavy">REVIEWED</text>
    <text x="740" y="173" class="ink metric">9<tspan class="muted small"> done</tspan></text>
    <text x="740" y="192" class="muted tiny">ready for merge checks</text>
    <rect x="930" y="108" width="222" height="92" rx="14" class="panel2"/>
    <text x="952" y="136" class="subtle tiny heavy">ISSUES</text>
    <text x="952" y="173" class="ink metric">7<tspan class="muted small"> open</tspan></text>
    <text x="952" y="192" class="muted tiny">2 linked to active PRs</text>
  </g>

  <rect x="294" y="222" width="600" height="450" rx="18" class="panel"/>
  <g class="txt">
    <g>
      <rect x="314" y="244" width="132" height="336" rx="14" class="lane"/>
      <text x="330" y="275" class="ink small heavy">WIP</text>
      <text x="422" y="275" class="muted small">4</text>
      <rect x="330" y="302" width="100" height="72" rx="10" class="card"/>
      <text x="342" y="328" class="ink small heavy">PR#590</text>
      <text x="342" y="348" class="muted tiny">moras-brain</text>
      <text x="342" y="366" class="blue tiny">issue #581</text>
      <rect x="330" y="390" width="100" height="72" rx="10" class="card"/>
      <text x="342" y="416" class="ink small heavy">PR#164</text>
      <text x="342" y="436" class="muted tiny">moras-console</text>
    </g>
    <g>
      <rect x="462" y="244" width="132" height="336" rx="14" class="lane"/>
      <text x="478" y="275" class="ink small heavy">UNDER REVIEW</text>
      <rect x="478" y="302" width="100" height="72" rx="10" class="card"/>
      <text x="490" y="328" class="ink small heavy">PR#612</text>
      <text x="490" y="348" class="muted tiny">moras-api</text>
      <text x="490" y="366" class="ok tiny">reviewed</text>
      <rect x="478" y="390" width="100" height="72" rx="10" class="card"/>
      <text x="490" y="416" class="ink small heavy">PR#307</text>
      <text x="490" y="436" class="muted tiny">moras-product</text>
    </g>
    <g>
      <rect x="610" y="244" width="132" height="336" rx="14" class="lane"/>
      <text x="626" y="275" class="ink small heavy">REVIEWING</text>
      <rect x="626" y="302" width="100" height="72" rx="10" fill="#251c17" stroke="#f97316"/>
      <text x="638" y="328" class="ink small heavy">PR#586</text>
      <text x="638" y="348" class="muted tiny">moras-brain</text>
      <text x="638" y="366" class="warn tiny">attention</text>
      <rect x="626" y="390" width="100" height="72" rx="10" class="card"/>
      <text x="638" y="416" class="ink small heavy">PR#171</text>
      <text x="638" y="436" class="muted tiny">queued</text>
    </g>
    <g>
      <rect x="758" y="244" width="116" height="336" rx="14" class="lane"/>
      <text x="774" y="275" class="ink small heavy">REVIEWED</text>
      <rect x="774" y="302" width="84" height="72" rx="10" class="card"/>
      <text x="786" y="328" class="ink small heavy">PR#577</text>
      <text x="786" y="348" class="ok tiny">done</text>
    </g>
    <rect x="314" y="600" width="560" height="52" rx="13" fill="#0f1724" stroke="#263246"/>
    <text x="332" y="631" class="muted small">Issue row</text>
    <rect x="414" y="616" width="82" height="22" rx="11" fill="#1e293b" stroke="#475569"/>
    <text x="434" y="631" class="ink tiny bold">#254</text>
    <rect x="508" y="616" width="82" height="22" rx="11" fill="#1e293b" stroke="#475569"/>
    <text x="528" y="631" class="ink tiny bold">#580</text>
  </g>

  <rect x="916" y="222" width="236" height="450" rx="18" class="panel"/>
  <g class="txt">
    <text x="938" y="255" class="subtle tiny heavy">NEEDS ATTENTION</text>
    <text x="938" y="286" class="ink" font-size="19" font-weight="850">moras-brain PR#586</text>
    <text x="938" y="312" class="muted small">Your PR has external feedback.</text>
    <rect x="938" y="344" width="192" height="1" fill="#263246"/>
    <text x="938" y="378" class="subtle tiny heavy">LATEST SIGNAL</text>
    <text x="938" y="402" class="ink small">Zhu.HuaKai commented 2m ago</text>
    <text x="938" y="442" class="subtle tiny heavy">LINKED ISSUE</text>
    <rect x="938" y="458" width="64" height="24" rx="12" class="pill"/>
    <text x="956" y="474" class="ink tiny bold">#581</text>
    <rect x="938" y="526" width="192" height="40" rx="12" fill="#f97316"/>
    <text x="997" y="551" class="ink small heavy">I'm on it</text>
    <rect x="938" y="582" width="192" height="40" rx="12" class="pill"/>
    <text x="1003" y="607" class="ink small bold">Open PR</text>
  </g>
</svg>
