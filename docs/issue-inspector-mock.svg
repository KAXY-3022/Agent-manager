<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Issue inspector mock screenshot</title>
  <desc id="desc">A dark mock screenshot matching the real issue assessment inspector with linked PR and score tiles.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <style><![CDATA[
      .bg{fill:#080b12}.app{fill:#0b101a}.rail{fill:#0e1421}.top{fill:#111827}.panel{fill:#111827;stroke:#263246}.panel2{fill:#151e2f;stroke:#334155}.lane{fill:#0f1724;stroke:#263246}.card{fill:#151e2f;stroke:#334155}.ink{fill:#edf2fb}.muted{fill:#97a3b7}.subtle{fill:#6f7d92}.cyan{fill:#66d9ef}.ok{fill:#4ade80}.warn{fill:#f59e0b}.orange{fill:#f97316}.txt{font-family:"Avenir Next","Aptos",system-ui,sans-serif}.mono{font-family:"JetBrains Mono","SFMono-Regular",Menlo,monospace}.heavy{font-weight:800}.bold{font-weight:650}.tiny{font-size:10px}.small{font-size:12px}.body{font-size:13px}.line{stroke:#263246;stroke-width:1}.pill{fill:#1e293b;stroke:#475569}
    ]]></style>
  </defs>
  <rect width="1200" height="760" class="bg"/>
  <rect x="18" y="18" width="1164" height="724" rx="22" class="app" filter="url(#shadow)"/>
  <rect x="18" y="18" width="252" height="724" rx="22" class="rail"/>
  <rect x="248" y="18" width="22" height="724" class="rail"/>
  <line x1="270" y1="18" x2="270" y2="742" class="line"/>
  <rect x="270" y="18" width="912" height="66" class="top"/>

  <g class="txt">
    <rect x="40" y="40" width="34" height="34" rx="11" fill="#66d9ef"/>
    <text x="52" y="63" font-size="16" font-weight="850" fill="#06111f">A</text>
    <text x="86" y="55" class="ink body heavy">A2A Review</text>
    <text x="86" y="73" class="muted small">Agent workflow board</text>
    <text x="42" y="126" class="subtle tiny heavy">REVIEW OPS</text>
    <rect x="38" y="144" width="190" height="36" rx="10" fill="#162337" stroke="#2f3d55"/>
    <rect x="38" y="144" width="4" height="36" rx="2" fill="#66d9ef"/>
    <text x="58" y="167" class="ink body bold">Board</text>
    <text x="58" y="211" class="muted body">Pull requests</text>
    <text x="58" y="251" class="muted body">Review drafts</text>
    <text x="58" y="291" class="muted body">Review requests</text>
    <text x="302" y="57" class="muted body">A2A / <tspan class="ink heavy">Board</tspan></text>
    <rect x="912" y="34" width="92" height="34" rx="10" class="panel2"/>
    <text x="935" y="56" class="ink small bold">Refresh</text>
    <rect x="1014" y="34" width="110" height="34" rx="10" fill="#1e293b" stroke="#f59e0b"/>
    <text x="1036" y="56" class="warn small bold">Scan Stale</text>
  </g>

  <rect x="294" y="108" width="600" height="564" rx="18" class="panel"/>
  <g class="txt">
    <text x="318" y="144" class="ink" font-size="21" font-weight="850">Tracked issues</text>
    <text x="318" y="168" class="muted small">Open issues are hidden when closed or covered by merged PRs.</text>
    <rect x="318" y="204" width="548" height="74" rx="13" class="card"/>
    <text x="338" y="231" class="muted tiny heavy">ISSUE#580</text>
    <text x="338" y="254" class="ink body heavy">product-analysis all-none cleanup intent</text>
    <rect x="770" y="223" width="74" height="24" rx="12" fill="#12251c" stroke="#4ade80"/>
    <text x="792" y="239" class="ok tiny heavy">PR#590</text>
    <rect x="318" y="296" width="548" height="74" rx="13" fill="#251c17" stroke="#f97316"/>
    <text x="338" y="323" class="muted tiny heavy">ISSUE#254</text>
    <text x="338" y="346" class="ink body heavy">use team acme email in outbound send path</text>
    <rect x="770" y="315" width="74" height="24" rx="12" fill="#13251b" stroke="#4ade80"/>
    <text x="795" y="331" class="ok tiny heavy">easy</text>
    <rect x="318" y="388" width="548" height="74" rx="13" class="card"/>
    <text x="338" y="415" class="muted tiny heavy">ISSUE#613</text>
    <text x="338" y="438" class="ink body heavy">console markdown rendering alignment</text>
    <rect x="770" y="407" width="74" height="24" rx="12" fill="#172136" stroke="#66d9ef"/>
    <text x="790" y="423" class="cyan tiny heavy">review</text>
    <rect x="318" y="502" width="548" height="118" rx="15" class="lane"/>
    <text x="340" y="535" class="subtle tiny heavy">RECENT QUEUE</text>
    <text x="340" y="565" class="muted small">issue#254 assessment saved locally</text>
    <text x="340" y="592" class="muted small">issue#580 skipped because PR#590 is linked</text>
  </g>

  <rect x="916" y="108" width="236" height="564" rx="18" class="panel"/>
  <g class="txt">
    <text x="938" y="143" class="subtle tiny heavy">NEEDS ATTENTION</text>
    <text x="938" y="174" class="ink" font-size="19" font-weight="850">moras-api Issue#254</text>
    <text x="938" y="199" class="muted small">Easy assessment is ready for approval.</text>
    <rect x="938" y="236" width="192" height="64" rx="13" class="panel2"/>
    <text x="954" y="263" class="subtle tiny heavy">LINKED PR</text>
    <rect x="954" y="274" width="70" height="22" rx="11" class="pill"/>
    <text x="974" y="289" class="ink tiny bold">PR#329</text>
    <rect x="938" y="324" width="192" height="180" rx="15" class="panel2"/>
    <text x="954" y="356" class="ink body heavy">Final Assessment</text>
    <rect x="1058" y="339" width="52" height="26" rx="13" fill="#16a34a"/>
    <text x="1073" y="356" class="ink tiny heavy">Easy</text>
    <text x="954" y="386" class="muted small">easy-direct-ready</text>
    <g class="mono">
      <rect x="954" y="414" width="38" height="48" rx="9" fill="#0b1220" stroke="#334155"/>
      <text x="962" y="433" class="muted tiny">diff</text><text x="968" y="454" class="ink body heavy">1</text>
      <rect x="1000" y="414" width="38" height="48" rx="9" fill="#0b1220" stroke="#334155"/>
      <text x="1006" y="433" class="muted tiny">work</text><text x="1014" y="454" class="ink body heavy">2</text>
      <rect x="1046" y="414" width="38" height="48" rx="9" fill="#0b1220" stroke="#334155"/>
      <text x="1054" y="433" class="muted tiny">prio</text><text x="1060" y="454" class="ink body heavy">4</text>
      <rect x="1092" y="414" width="38" height="48" rx="9" fill="#0b1220" stroke="#334155"/>
      <text x="1098" y="433" class="muted tiny">risk</text><text x="1106" y="454" class="ink body heavy">1</text>
    </g>
    <rect x="938" y="542" width="192" height="40" rx="12" fill="#f97316"/>
    <text x="985" y="567" class="ink small heavy">Approve auto-fix</text>
    <rect x="938" y="596" width="192" height="40" rx="12" class="pill"/>
    <text x="996" y="621" class="ink small bold">Open analysis</text>
  </g>
</svg>
