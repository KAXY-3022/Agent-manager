<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Issue inspector mock screenshot</title>
  <desc id="desc">A mock dashboard issue inspector showing linked pull requests, assessment scores, and auto-fix actions.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="#f4f7fb"/>
  <rect x="48" y="42" width="1104" height="676" rx="22" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="48" y="42" width="1104" height="52" rx="22" fill="#111827"/>
  <rect x="48" y="76" width="1104" height="18" fill="#111827"/>
  <circle cx="80" cy="68" r="6" fill="#ef4444"/>
  <circle cx="102" cy="68" r="6" fill="#f59e0b"/>
  <circle cx="124" cy="68" r="6" fill="#22c55e"/>
