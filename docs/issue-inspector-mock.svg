    <rect x="844" y="406" width="44" height="48" rx="10" fill="#0f172a" stroke="#334155"/>
    <text x="856" y="426" fill="#94a3b8">diff</text><text x="862" y="446" fill="#ffffff">1</text>
    <rect x="900" y="406" width="44" height="48" rx="10" fill="#0f172a" stroke="#334155"/>
    <text x="908" y="426" fill="#94a3b8">work</text><text x="918" y="446" fill="#ffffff">2</text>
    <rect x="956" y="406" width="44" height="48" rx="10" fill="#0f172a" stroke="#334155"/>
    <text x="965" y="426" fill="#94a3b8">risk</text><text x="974" y="446" fill="#ffffff">1</text>
    <rect x="1012" y="406" width="44" height="48" rx="10" fill="#0f172a" stroke="#334155"/>
    <text x="1020" y="426" fill="#94a3b8">prio</text><text x="1030" y="446" fill="#ffffff">4</text>
