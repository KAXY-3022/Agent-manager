  <text x="136" y="408" font-family="Arial, sans-serif" font-size="12" fill="#64748b">assessment ready / awaiting approval</text>

  <rect x="112" y="442" width="590" height="82" rx="13" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="136" y="470" font-family="Arial, sans-serif" font-size="12" font-weight="900" fill="#475569">issue#613</text>
  <text x="136" y="494" font-family="Arial, sans-serif" font-size="15" font-weight="800" fill="#0f172a">console markdown rendering alignment</text>
