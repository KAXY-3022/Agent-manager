  <rect x="824" y="530" width="246" height="38" rx="11" fill="#f97316"/>
  <text x="884" y="554" font-family="Arial, sans-serif" font-size="13" font-weight="900" fill="#ffffff">Approve auto-fix</text>
  <rect x="824" y="582" width="246" height="38" rx="11" fill="#1e293b" stroke="#475569"/>
  <text x="902" y="606" font-family="Arial, sans-serif" font-size="13" font-weight="800" fill="#e2e8f0">Open analysis</text>
